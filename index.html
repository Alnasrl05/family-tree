<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2e7d32">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>شجرة أبناء محمد الناصري</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f5;--bg2:#ffffff;--bd:#d8dde4;--bd2:#bcc4ce;--tx:#1a2332;--tx2:#4a5568;--tx3:#8896a6;--green:#2e7d32;--blue:#1976d2;--pink:#c2185b;--fd:'Noto Kufi Arabic',sans-serif;--fb:'Tajawal',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);overflow:hidden;height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* Login */
#loginOverlay{position:fixed;inset:0;background:rgba(240,242,245,.96);backdrop-filter:blur(16px);z-index:999;display:flex;align-items:center;justify-content:center}
#loginOverlay.hidden{display:none}
.login-box{background:#fff;border:1px solid var(--bd);border-radius:20px;padding:32px 28px;text-align:center;max-width:360px;width:92%;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.login-title{font-family:var(--fd);font-size:21px;font-weight:800;background:linear-gradient(90deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.login-sub{color:var(--tx3);font-size:13px;margin-bottom:20px;line-height:1.7}
.login-input{width:100%;padding:11px 16px;border-radius:12px;border:1px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:15px;font-family:var(--fb);outline:none;text-align:center;direction:ltr;margin-bottom:12px}
.login-input:focus{border-color:var(--blue)}
.login-btn{width:100%;padding:11px;border-radius:12px;border:none;background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;font-size:15px;font-weight:700;font-family:var(--fb);cursor:pointer;margin-bottom:8px}
.login-guest{width:100%;padding:10px;border-radius:12px;border:1px solid var(--bd2);background:transparent;color:var(--tx2);font-size:14px;font-family:var(--fb);cursor:pointer}
.login-err{color:#d32f2f;font-size:12px;margin-bottom:8px;display:none}

/* Header */
.hdr{background:linear-gradient(135deg,#0d1a26e8,#142d45e8);border-bottom:1px solid var(--bd);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;z-index:50}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-icon{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border:2px solid #66bb6a80;display:flex;align-items:center;justify-content:center;font-size:18px}
.hdr-title{font-family:var(--fd);font-size:15px;font-weight:800;background:linear-gradient(90deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:10px;color:var(--tx3)}
.hdr-actions{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{padding:3px 10px;border-radius:16px;font-size:10px;font-weight:700;font-family:var(--fb)}
.badge-admin{background:rgba(46,125,50,.1);border:1px solid #43a047;color:#2e7d32}
.badge-viewer{background:rgba(25,118,210,.1);border:1px solid #1976d280;color:#1976d2}
.btn{padding:7px 12px;border-radius:9px;border:1px solid var(--bd2);background:#fff;color:var(--tx2);font-size:11px;font-family:var(--fb);cursor:pointer;white-space:nowrap;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.btn:hover{background:#f5f7fa;color:var(--tx)}
.btn-g{background:linear-gradient(135deg,#2e7d32,#388e3c);color:#fff;border:none}
.btn-r{background:#fff;color:#d32f2f;border:1px solid #ef535040}
.btn:disabled{opacity:.35;cursor:default;pointer-events:none}

/* Toolbar */
.toolbar{padding:7px 16px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--bd);background:rgba(13,26,38,.5)}
.search-wrap{position:relative;flex:1;min-width:140px}
.search-wrap input{width:100%;padding:8px 12px;border-radius:10px;border:1px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:12px;font-family:var(--fb);outline:none;direction:rtl}
.search-wrap input:focus{border-color:var(--blue)}
.search-res{position:absolute;top:100%;right:0;left:0;background:#fff;border:1px solid var(--bd);border-radius:9px;margin-top:3px;z-index:80;max-height:180px;overflow-y:auto;display:none;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.search-res.open{display:block}
.search-item{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--bd);color:var(--tx)}
.search-item:hover{background:rgba(41,182,246,.08)}
.zoom-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--bd2);background:#fff;color:var(--tx2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.zoom-lbl{color:var(--tx3);font-size:10px;min-width:32px;text-align:center;font-family:monospace}

/* Main */
.main{display:flex;flex-direction:column;flex:1;overflow:hidden}
.tree-area{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
.tree-inner{display:inline-flex;justify-content:center;min-width:100%;padding:10px 20px;transition:transform .2s;transform-origin:top center}

/* Cards */
.card{width:180px;min-height:70px;padding:8px 10px;text-align:center;cursor:pointer;position:relative;transition:all .2s;flex-shrink:0;user-select:none}
.card:hover{transform:scale(1.05)}
.card.sel{transform:scale(1.07)}
.card.male{border-radius:11px}
.card.female{
  border-radius:30px;
  border:3px solid #ec407a!important;
  background:linear-gradient(135deg,#fce4ec,#f8bbd0)!important;
  box-shadow:0 2px 12px rgba(236,64,122,.18),inset 0 0 15px rgba(236,64,122,.04);
}
.card.female .card-av{border-color:#ec407a!important;background:rgba(236,64,122,.1)!important}
.card.female .card-name{color:#880e4f!important}
.card.female .card-spouse{color:#ad1457!important}
.card.female .card-badge{background:#ec407a!important}
.card.female::before{
  content:'♀';position:absolute;top:-4px;right:-4px;
  width:24px;height:24px;border-radius:50%;
  background:#ec407a;color:#fff;font-size:14px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(236,64,122,.3);z-index:1;
}
.card-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 3px;font-size:17px;overflow:hidden}
.card-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.card-name{font-family:var(--fd);font-weight:700;font-size:24px;line-height:1.4}
.card-spouse{font-size:14px;opacity:.65}
.card-years{font-size:12px;opacity:.5;direction:ltr;font-family:monospace;margin-top:2px}
.card-badge{position:absolute;top:-6px;left:-6px;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:bold;color:#fff;display:flex;align-items:center;justify-content:center}

/* Tree layout */
.tree-node{display:flex;flex-direction:column;align-items:center}
.tree-node-v{display:flex;flex-direction:column;align-items:flex-start}
.ch-h{display:flex;gap:10px;justify-content:center}

/* Root card (الوالد) - bigger */
.root-card{width:230px!important;min-height:95px!important;padding:12px 14px!important}
.root-card .card-av{width:56px!important;height:56px!important;font-size:26px!important;margin-bottom:6px!important;border-width:2.5px!important}
.root-card .card-name{font-size:28px!important}
.root-card .card-spouse{font-size:16px!important}
.root-card .card-years{font-size:13px!important}
.root-card .card-badge{width:26px!important;height:26px!important;font-size:13px!important;top:-8px!important;left:-8px!important}

/* Side Panel */
.side-panel{width:290px;min-width:260px;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-right:1px solid var(--bd);padding:16px;overflow-y:auto;position:fixed;top:0;bottom:0;left:0;z-index:90;display:none;box-shadow:4px 0 20px rgba(0,0,0,.08)}
.side-panel.open{display:block}
.panel-title{font-family:var(--fd);font-size:14px;color:var(--blue);margin-bottom:12px}
.fg{margin-bottom:10px}
.fl{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:3px}
.fi{width:100%;padding:8px 11px;border-radius:9px;border:1px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:12px;font-family:var(--fb);outline:none;direction:rtl;box-sizing:border-box}
.fi:focus{border-color:var(--blue)}
textarea.fi{min-height:40px;resize:vertical}
.gender-btns{display:flex;gap:6px}
.gbtn{flex:1;padding:7px;border-radius:9px;font-size:12px;font-family:var(--fb);cursor:pointer;text-align:center;border:2px solid var(--bd2);background:var(--bg);color:var(--tx2)}
.gbtn.am{border-color:var(--blue);color:var(--blue);background:rgba(41,182,246,.08);font-weight:700}
.gbtn.af{border-color:var(--pink);color:var(--pink);background:rgba(236,64,122,.08);font-weight:700}
.photo-area{display:flex;align-items:center;gap:8px}
.photo-prev{width:48px;height:48px;border-radius:50%;background:var(--bg);border:2px dashed var(--bd2);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:20px;color:var(--tx3);flex-shrink:0}
.photo-prev img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* Stats */
.stats{display:flex;justify-content:space-around;padding:7px 16px;border-top:1px solid var(--bd);background:rgba(255,255,255,.8)}
.stat-n{font-size:16px;font-weight:800;font-family:monospace;color:var(--tx)}
.stat-l{font-size:9px;color:var(--tx3)}

/* Gen Colors - Light */
.g0{--gb:#e8f5e9;--gd:#66bb6a;--gt:#1b5e20;--ga:#2e7d32}
.g1{--gb:#e3f2fd;--gd:#42a5f5;--gt:#0d47a1;--ga:#1565c0}
.g2{--gb:#f3e5f5;--gd:#ab47bc;--gt:#4a148c;--ga:#7b1fa2}
.g3{--gb:#fff3e0;--gd:#ffa726;--gt:#e65100;--ga:#ef6c00}
.g4{--gb:#fce4ec;--gd:#ec407a;--gt:#880e4f;--ga:#c2185b}
.g5{--gb:#e0f7fa;--gd:#26c6da;--gt:#006064;--ga:#00838f}
.card{background:var(--gb);border:2px solid var(--gd);color:var(--gt);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card.sel{border-color:var(--ga);box-shadow:0 0 16px color-mix(in srgb,var(--ga) 30%,transparent),0 3px 12px rgba(0,0,0,.1)}
.card-av{background:color-mix(in srgb,var(--ga) 12%,#fff);border:2px solid var(--ga)}
.card-badge{background:var(--ga)}

@media(max-width:700px){
  .hdr{padding:8px 10px}.hdr-title{font-size:13px}.hdr-icon{width:32px;height:32px;font-size:15px}
  .btn{padding:5px 8px;font-size:10px}.toolbar{padding:5px 10px;gap:4px}
  .side-panel{width:100%;min-width:unset}
  .card{width:105px;min-height:48px;padding:4px 5px}.card-name{font-size:10px}.card-av{width:28px;height:28px;font-size:14px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
 <div class="login-box">
  <div style="font-size:48px;margin-bottom:12px">🌳</div>
  <div class="login-title">شجرة أبناء محمد الناصري</div>
  <div class="login-sub">أدخل كلمة المرور للتعديل والإضافة<br>أو تصفح الشجرة كزائر</div>
  <div class="login-err" id="loginErr">كلمة المرور غير صحيحة</div>
  <input class="login-input" type="password" id="loginPass" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="login-btn" onclick="doLogin()">🔓 دخول كمسؤول</button>
  <button class="login-guest" onclick="doGuest()">👁️ تصفح كزائر (اطلاع فقط)</button>
 </div>
</div>

<!-- SETTINGS BAR -->
<div style="background:#ffffffe8;backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;flex-direction:column;gap:8px;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.06)">
 <!-- Row 1: Brand + Role + Logout -->
 <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
  <div class="hdr-brand">
   <div class="hdr-icon">🌳</div>
   <div><div class="hdr-title">شجرة أبناء محمد الناصري</div><div class="hdr-sub" id="countLbl">0 عضو</div></div>
  </div>
  <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
   <span class="badge badge-viewer" id="roleBadge">👁️ زائر</span>
   <button class="btn" onclick="doLogout()">🚪 خروج</button>
  </div>
 </div>
 <!-- Row 2: Search + Actions + Zoom -->
 <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
  <div class="search-wrap">
   <input id="searchIn" placeholder="🔍 بحث عن عضو..." oninput="doSearch()" onfocus="doSearch()">
   <div class="search-res" id="searchRes"></div>
  </div>
  <button class="btn btn-g admin-only" id="btnAdd" disabled onclick="doAdd()">➕ إضافة ابن/بنت</button>
  <button class="btn admin-only" id="btnEdit" disabled onclick="openEdit()">✏️ تعديل</button>
  <button class="btn btn-r admin-only" id="btnDel" disabled onclick="doDelSel()">🗑️ حذف</button>
  <button class="btn admin-only" onclick="doExport()">📤 تصدير</button>
  <button class="btn admin-only" onclick="doImport()">📥 استيراد</button>
  <div style="display:flex;align-items:center;gap:3px;margin-right:auto">
   <button class="zoom-btn" onclick="chZoom(-.05)">−</button>
   <span class="zoom-lbl" id="zoomLbl">50%</span>
   <button class="zoom-btn" onclick="chZoom(.05)">+</button>
   <button class="btn" onclick="fitZoom()" style="padding:4px 8px;font-size:10px">⊞ ملائمة</button>
  </div>
 </div>
</div>

<!-- TREE -->
<div class="main">
 <div class="tree-area" id="treeArea">
  <div class="tree-inner" id="treeInner"></div>
 </div>
</div>

<!-- EDIT PANEL -->
<div class="side-panel" id="editPanel">
 <div class="panel-title">✏️ تعديل</div>
 <div class="fg"><label class="fl">الصورة</label>
  <div class="photo-area">
   <div class="photo-prev" id="photoPrev">👤</div>
   <div style="display:flex;flex-direction:column;gap:4px">
    <button class="btn" onclick="$('photoIn').click()">📷 رفع</button>
    <button class="btn btn-r" id="btnRmPhoto" onclick="rmPhoto()" style="display:none">✕ حذف</button>
   </div>
   <input type="file" id="photoIn" accept="image/*" style="display:none" onchange="onPhoto(event)">
  </div>
 </div>
 <div class="fg"><label class="fl">الاسم</label><input class="fi" id="fName"></div>
 <div class="fg"><label class="fl">الجنس</label>
  <div class="gender-btns"><button class="gbtn" id="gM" onclick="setG('male')">👨 ذكر</button><button class="gbtn" id="gF" onclick="setG('female')">👩 أنثى</button></div>
 </div>
 <div class="fg"><label class="fl">الزوج/الزوجة</label><input class="fi" id="fSpouse"></div>
 <div style="display:flex;gap:8px">
  <div class="fg" style="flex:1"><label class="fl">سنة الميلاد</label><input class="fi" id="fBirth" style="direction:ltr;text-align:center"></div>
  <div class="fg" style="flex:1"><label class="fl">سنة الوفاة</label><input class="fi" id="fDeath" style="direction:ltr;text-align:center" placeholder="فارغ=حي"></div>
 </div>
 <div class="fg"><label class="fl">ملاحظات</label><textarea class="fi" id="fNotes"></textarea></div>
 <button class="btn btn-g" style="width:100%;padding:10px;font-size:13px" onclick="saveMember()">💾 حفظ</button>
 <button class="btn" style="width:100%;margin-top:5px" onclick="closeEdit()">إلغاء</button>
 <button class="btn btn-r" id="btnDelEdit" style="width:100%;margin-top:8px" onclick="doDelEdit()">🗑️ حذف العضو وأبنائه</button>
</div>

<!-- STATS -->
<div class="stats">
 <div style="text-align:center"><div class="stat-n" id="stT">0</div><div class="stat-l">الإجمالي</div></div>
 <div style="text-align:center"><div class="stat-n" id="stM" style="color:var(--blue)">0</div><div class="stat-l">ذكور</div></div>
 <div style="text-align:center"><div class="stat-n" id="stF" style="color:var(--pink)">0</div><div class="stat-l">إناث</div></div>
 <div style="text-align:center"><div class="stat-n" id="stA" style="color:var(--green)">0</div><div class="stat-l">أحياء</div></div>
</div>

<script>
const STORE='family_tree_v4';
const PASS='admin123'; // غيّر قبل النشر
// مفاتيح التخزين السابقة للبحث عن بيانات محفوظة
const OLD_KEYS=['family_tree_v4','family_tree_v3','family_tree_data','family_tree_data_v2'];

const DEFAULT={members:{
 father:{id:'father',name:'محمد العبدالله الناصري',birthYear:'',deathYear:'',gender:'male',parentId:null,spouseName:'مريم الناصر',notes:'',photo:''},
 nora:{id:'nora',name:'نورة',birthYear:'',deathYear:'',gender:'female',parentId:'father',spouseName:'',notes:'',photo:''},
 abdullah:{id:'abdullah',name:'عبدالله',birthYear:'',deathYear:'',gender:'male',parentId:'father',spouseName:'',notes:'',photo:''},
 ibrahim:{id:'ibrahim',name:'ابراهيم',birthYear:'',deathYear:'',gender:'male',parentId:'father',spouseName:'',notes:'',photo:''},
 saleh:{id:'saleh',name:'صالح',birthYear:'',deathYear:'',gender:'male',parentId:'father',spouseName:'',notes:'',photo:''},
 abdulaziz:{id:'abdulaziz',name:'عبدالعزيز',birthYear:'',deathYear:'',gender:'male',parentId:'father',spouseName:'',notes:'',photo:''},
 abdulrahman:{id:'abdulrahman',name:'عبدالرحمن',birthYear:'',deathYear:'',gender:'male',parentId:'father',spouseName:'',notes:'',photo:''},
 sulaiman:{id:'sulaiman',name:'سليمان',birthYear:'',deathYear:'',gender:'male',parentId:'father',spouseName:'',notes:'',photo:''}
},rootId:'father'};

const GC=[
 {bg:'#e8f5e9',bd:'#66bb6a',tx:'#1b5e20',ac:'#2e7d32'},
 {bg:'#e3f2fd',bd:'#42a5f5',tx:'#0d47a1',ac:'#1565c0'},
 {bg:'#f3e5f5',bd:'#ab47bc',tx:'#4a148c',ac:'#7b1fa2'},
 {bg:'#fff3e0',bd:'#ffa726',tx:'#e65100',ac:'#ef6c00'},
 {bg:'#fce4ec',bd:'#ec407a',tx:'#880e4f',ac:'#c2185b'},
 {bg:'#e0f7fa',bd:'#26c6da',tx:'#006064',ac:'#00838f'}
];
const g=d=>GC[d%GC.length];
const $=id=>document.getElementById(id);
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const gid=()=>'m_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const getCh=(pid)=>Object.values(D.members).filter(m=>m.parentId===pid).sort((a,b)=>{
 const ya=parseInt(a.birthYear)||99999;
 const yb=parseInt(b.birthYear)||99999;
 return ya-yb;
});

let D,selId=null,editId=null,isAdmin=false,zoom=0.5,fGender='male',fPhoto='';

// ═══ FIREBASE ═══
const firebaseConfig = {
 databaseURL: "https://alnasrifamily-tree-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const dbRef = db.ref('familyTree');

// ═══ LOAD/SAVE ═══
function load(){
 // First load from localStorage for instant display
 try{
  let raw=localStorage.getItem(STORE);
  if(!raw){for(const k of OLD_KEYS){raw=localStorage.getItem(k);if(raw)break}}
  if(raw){
   D=JSON.parse(raw);
   Object.values(D.members).forEach(m=>{if(!m.photo)m.photo=''});
  }else{
   D=JSON.parse(JSON.stringify(DEFAULT));
  }
 }catch{D=JSON.parse(JSON.stringify(DEFAULT))}

 // Then sync from Firebase (overrides local if exists)
 dbRef.on('value', snap => {
  const val = snap.val();
  if(val && val.members && val.rootId){
   D = val;
   Object.values(D.members).forEach(m=>{if(!m.photo)m.photo=''});
   localStorage.setItem(STORE, JSON.stringify(D));
   render();
  }
 });
}

function save(){
 try{
  localStorage.setItem(STORE, JSON.stringify(D));
  // Save to Firebase
  dbRef.set(D);
 }catch(e){console.error('Save error:',e)}
}

// Upload local data to Firebase if Firebase is empty
function syncInitial(){
 dbRef.once('value', snap => {
  if(!snap.val()){
   // Firebase empty, push local data
   dbRef.set(D);
  }
 });
}

// ═══ AUTH ═══
function doLogin(){
 if($('loginPass').value===PASS){isAdmin=true;sessionStorage.setItem('ft_r','a');$('loginOverlay').classList.add('hidden');$('loginErr').style.display='none';applyRole()}
 else $('loginErr').style.display='block'
}
function doGuest(){isAdmin=false;sessionStorage.setItem('ft_r','v');$('loginOverlay').classList.add('hidden');applyRole()}
function doLogout(){sessionStorage.removeItem('ft_r');isAdmin=false;$('loginOverlay').classList.remove('hidden');$('loginPass').value='';$('loginErr').style.display='none';closeEdit()}
function applyRole(){
 const b=$('roleBadge'),els=document.querySelectorAll('.admin-only');
 if(isAdmin){b.className='badge badge-admin';b.textContent='🔓 مسؤول';els.forEach(e=>e.style.display='')}
 else{b.className='badge badge-viewer';b.textContent='👁️ زائر';els.forEach(e=>e.style.display='none')}
 render()
}
function checkSess(){const r=sessionStorage.getItem('ft_r');if(r==='a'){isAdmin=true;$('loginOverlay').classList.add('hidden');applyRole()}else if(r==='v'){isAdmin=false;$('loginOverlay').classList.add('hidden');applyRole()}}

// ═══ RENDER ═══
function renderCard(mid,depth){
 const m=D.members[mid];if(!m)return '';
 const c=g(depth),s=selId===mid,ch=getCh(mid),gen=m.gender==='male'?'male':'female';
 const isRoot=mid===D.rootId;
 const cls=`card g${depth%6} ${gen} ${s?'sel':''} ${isRoot?'root-card':''}`;
 let h=`<div class="${cls}" onclick="sel('${mid}')">`;
 if(ch.length)h+=`<div class="card-badge">${ch.length}</div>`;
 h+=`<div class="card-av">${m.photo?`<img src="${m.photo}">`:(m.gender==='male'?'👨':'👩')}</div>`;
 h+=`<div class="card-name">${esc(m.name||'—')}</div>`;
 if(m.spouseName)h+=`<div class="card-spouse">∞ ${esc(m.spouseName)}</div>`;
 if(m.birthYear||m.deathYear)h+=`<div class="card-years">${m.birthYear||'?'} — ${m.deathYear||'الآن'}</div>`;
 return h+'</div>';
}

function renderH(mid,depth){
 const m=D.members[mid];if(!m)return '';
 const ch=getCh(mid),c=g(depth),isV=depth%2!==0;

 if(ch.length&&isV){
  // Vertical children: parent card aligned to the right (start) of the vertical list
  let h='<div class="tree-node-v">';
  // Parent card + connector on top, aligned right
  h+='<div style="display:flex;flex-direction:column;align-items:flex-start;padding-right:22px">';
  h+=renderCard(mid,depth);
  h+=`<svg width="2" height="8" style="display:block;margin-right:55px"><line x1="1" y1="0" x2="1" y2="8" stroke="${c.bd}88" stroke-width="2"/></svg>`;
  h+='</div>';
  h+=renderVList(ch,depth);
  h+='</div>';
  return h;
 }

 let h='<div class="tree-node">';
 h+=renderCard(mid,depth);
 if(ch.length&&!isV){
  h+=`<svg width="2" height="10" style="display:block;margin:0 auto"><line x1="1" y1="0" x2="1" y2="10" stroke="${c.bd}88" stroke-width="2"/></svg>`;
  if(ch.length>1)h+=`<div style="height:2px;background:${c.bd}66;align-self:stretch;margin:0 55px"></div>`;
  h+='<div class="ch-h">';
  ch.forEach(c2=>h+=renderH(c2.id,depth+1));
  h+='</div>';
 }
 return h+'</div>';
}

function renderVList(items,pDepth){
 const c=g(pDepth),cd=pDepth+1;
 // Render items, then use JS to measure and draw SVG
 const uid='vl_'+Math.random().toString(36).slice(2,8);
 let h=`<div style="display:flex;flex-direction:row" id="${uid}">`;
 h+=`<svg class="vsvg" width="22" style="flex-shrink:0;overflow:visible"></svg>`;
 h+=`<div style="display:flex;flex-direction:column;gap:5px" class="vitems">`;
 items.forEach((item,i)=>{
  const m=D.members[item.id];if(!m)return;
  const subCh=getCh(item.id),cc=g(cd);
  h+=`<div class="vitem-row" data-depth="${pDepth}">`;
  h+=renderCard(item.id,cd);
  if(subCh.length){
   h+=`<div style="margin-top:4px;margin-right:8px;display:flex;flex-direction:column;align-items:flex-start">`;
   h+=`<svg width="2" height="8" style="display:block;margin-right:57px"><line x1="1" y1="0" x2="1" y2="8" stroke="${cc.bd}88" stroke-width="2"/></svg>`;
   if(subCh.length>1)h+=`<div style="height:2px;background:${cc.bd}66;align-self:stretch;margin:0 30px"></div>`;
   h+='<div class="ch-h" style="gap:10px">';
   subCh.forEach(sc=>h+=renderH(sc.id,cd+1));
   h+='</div></div>';
  }
  h+='</div>';
 });
 h+='</div></div>';
 // After render, we'll fix SVGs
 setTimeout(()=>fixVSVG(uid,pDepth),0);
 return h;
}

function fixVSVG(uid,pDepth){
 const el=document.getElementById(uid);if(!el)return;
 const svg=el.querySelector('.vsvg');
 const rows=el.querySelectorAll(':scope > .vitems > .vitem-row');
 if(!rows.length)return;
 const c=g(pDepth);
 const parentRect=el.getBoundingClientRect();
 let lines='';
 const armYs=[];
 rows.forEach((row,i)=>{
  const card=row.querySelector('.card');
  if(!card)return;
  const rr=card.getBoundingClientRect();
  const armY=rr.top-parentRect.top+rr.height/2;
  armYs.push(armY);
 });
 // Draw trunk segments and arms
 for(let i=0;i<armYs.length;i++){
  const ay=armYs[i];
  // Trunk: from previous arm (or top) to this arm
  const fromY=i===0?0:armYs[i-1];
  lines+=`<line x1="2" y1="${fromY}" x2="2" y2="${ay}" stroke="${c.bd}88" stroke-width="2"/>`;
  // Arm
  lines+=`<line x1="2" y1="${ay}" x2="22" y2="${ay}" stroke="${c.bd}88" stroke-width="2"/>`;
 }
 const totalH=armYs.length?armYs[armYs.length-1]+2:50;
 svg.setAttribute('height',totalH);
 svg.innerHTML=lines;
}

function render(){
 $('treeInner').innerHTML=renderH(D.rootId,0);
 $('treeInner').style.transform=`scale(${zoom})`;
 $('zoomLbl').textContent=Math.round(zoom*100)+'%';
 // Fix all vertical SVGs after DOM update
 setTimeout(()=>{
  document.querySelectorAll('[id^="vl_"]').forEach(el=>{
   const uid=el.id;
   const rows=el.querySelectorAll(':scope > .vitems > .vitem-row');
   if(rows.length){
    const depth=parseInt(rows[0].dataset.depth)||0;
    fixVSVG(uid,depth);
   }
  });
 },50);
 updStats();updBtns();
}

// ═══ SELECT ═══
function sel(id){selId=id;closeEdit();render()}
function updBtns(){
 const a=$('btnAdd'),e=$('btnEdit'),d=$('btnDel');
 if(a)a.disabled=!selId;
 if(e)e.disabled=!selId;
 if(d)d.disabled=!selId||selId===D.rootId;
}

// ═══ ADD ═══
function doAdd(){
 if(!selId||!isAdmin)return;
 const nid=gid();
 D.members[nid]={id:nid,name:'',birthYear:'',deathYear:'',gender:'male',parentId:selId,spouseName:'',notes:'',photo:''};
 save();selId=nid;render();openEdit();
}

// ═══ EDIT ═══
function openEdit(){
 if(!selId||!D.members[selId]||!isAdmin)return;
 editId=selId;const m=D.members[editId];
 $('fName').value=m.name||'';$('fSpouse').value=m.spouseName||'';
 $('fBirth').value=m.birthYear||'';$('fDeath').value=m.deathYear||'';
 $('fNotes').value=m.notes||'';setG(m.gender||'male');
 fPhoto=m.photo||'';updPhoto();
 $('btnDelEdit').style.display=editId===D.rootId?'none':'block';
 $('editPanel').classList.add('open');
}
function closeEdit(){$('editPanel').classList.remove('open');editId=null}
function setG(v){fGender=v;$('gM').className='gbtn'+(v==='male'?' am':'');$('gF').className='gbtn'+(v==='female'?' af':'')}
function saveMember(){
 if(!editId||!D.members[editId])return;
 const m=D.members[editId];
 m.name=$('fName').value.trim()||'بدون اسم';m.spouseName=$('fSpouse').value.trim();
 m.birthYear=$('fBirth').value.trim();m.deathYear=$('fDeath').value.trim();
 m.notes=$('fNotes').value.trim();m.gender=fGender;m.photo=fPhoto;
 save();closeEdit();render();
}
function doDelEdit(){
 if(!editId||editId===D.rootId)return;
 delMember(editId);closeEdit();
}
function doDelSel(){
 if(!selId||selId===D.rootId||!isAdmin)return;
 delMember(selId);
}
function delMember(id){
 const m=D.members[id];if(!m)return;
 const ch=getCh(id);
 if(!confirm(`حذف "${m.name}"${ch.length?' و'+ch.length+' أبناء':''}؟`))return;
 const del=new Set(),q=[id];
 while(q.length){const c=q.shift();del.add(c);getCh(c).forEach(x=>q.push(x.id))}
 for(const x of del)delete D.members[x];
 save();selId=null;render();
}

// ═══ PHOTO ═══
function onPhoto(e){
 const f=e.target.files[0];if(!f)return;
 const r=new FileReader();r.onload=ev=>{
  const img=new Image();img.onload=()=>{
   const cv=document.createElement('canvas'),M=200;
   let w=img.width,h=img.height;
   if(w>h){h=Math.round(h*M/w);w=M}else{w=Math.round(w*M/h);h=M}
   cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
   fPhoto=cv.toDataURL('image/jpeg',.7);updPhoto();
  };img.src=ev.target.result;
 };r.readAsDataURL(f);e.target.value='';
}
function rmPhoto(){fPhoto='';updPhoto()}
function updPhoto(){
 const p=$('photoPrev'),b=$('btnRmPhoto');
 if(fPhoto){p.innerHTML=`<img src="${fPhoto}">`;b.style.display='block'}
 else{p.innerHTML='👤';b.style.display='none'}
}

// ═══ SEARCH ═══
function doSearch(){
 const q=$('searchIn').value.trim(),c=$('searchRes');
 if(!q){c.classList.remove('open');return}
 const r=Object.values(D.members).filter(m=>(m.name&&m.name.includes(q))||(m.spouseName&&m.spouseName.includes(q)));
 if(!r.length){c.classList.remove('open');return}
 c.innerHTML=r.map(m=>`<div class="search-item" onclick="jumpTo('${m.id}')">${m.gender==='male'?'👨':'👩'} ${esc(m.name)}</div>`).join('');
 c.classList.add('open');
}
function jumpTo(id){selId=id;$('searchIn').value='';$('searchRes').classList.remove('open');render();
 setTimeout(()=>{const el=document.querySelector('.card.sel');if(el)el.scrollIntoView({behavior:'smooth',block:'center',inline:'center'})},100);
}
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))$('searchRes').classList.remove('open')});

// ═══ ZOOM ═══
function chZoom(d){zoom=Math.max(.15,Math.min(2,zoom+d));$('treeInner').style.transform=`scale(${zoom})`;$('zoomLbl').textContent=Math.round(zoom*100)+'%'}
function fitZoom(){
 const area=$('treeArea'),inner=$('treeInner');
 if(!area||!inner)return;
 const aW=area.clientWidth,cW=inner.scrollWidth/zoom;
 zoom=Math.min(1,Math.max(.15,(aW-30)/cW));
 zoom=Math.round(zoom*100)/100;
 inner.style.transform=`scale(${zoom})`;$('zoomLbl').textContent=Math.round(zoom*100)+'%';
}

// ═══ STATS ═══
function updStats(){
 const a=Object.values(D.members);
 $('stT').textContent=a.length;
 $('stM').textContent=a.filter(m=>m.gender==='male').length;
 $('stF').textContent=a.filter(m=>m.gender==='female').length;
 $('stA').textContent=a.filter(m=>!m.deathYear).length;
 $('countLbl').textContent=a.length+' عضو';
}

// ═══ EXPORT/IMPORT ═══
function doExport(){if(!isAdmin)return;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(D,null,2)]));a.download='family-tree.json';a.click()}
function doImport(){if(!isAdmin)return;const inp=document.createElement('input');inp.type='file';inp.accept='.json';
 inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.members&&d.rootId){D=d;save();selId=null;closeEdit();render()}}catch{alert('خطأ')}};r.readAsText(f)};inp.click()}

// ═══ INIT ═══
load();render();checkSess();
setTimeout(fitZoom,200);
setTimeout(syncInitial,1000);

// ═══ PWA Service Worker ═══
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW:',e));
}
</script>
